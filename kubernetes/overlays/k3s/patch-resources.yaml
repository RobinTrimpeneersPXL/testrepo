apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-agent
spec:
  template:
    spec:
      containers:
      - name: agent
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
