apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-runner
  labels:
    app: github-runner
spec:
  replicas: 5
  selector:
    matchLabels:
      app: github-runner
  template:
    metadata:
      labels:
        app: github-runner
    spec:
      dnsPolicy: "None"
      dnsConfig:
        nameservers:
          - 8.8.8.8
          - 1.1.1.1
      containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash", "-c"]
        args:
          - |
            # Use the Pod Name (HOSTNAME) as the runner name to avoid collisions
            ./config.sh --url "${REPO_URL}" --token "${RUNNER_TOKEN}" --name "${HOSTNAME}" --unattended --replace && ./run.sh
        env:
        - name: REPO_URL
          valueFrom:
            secretKeyRef:
              name: github-secrets
              key: GITHUB_REPO_URL
        - name: RUNNER_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-secrets
              key: GITHUB_RUNNER_TOKEN
        volumeMounts:
        - name: docker-socket
          mountPath: /var/run/docker.sock
        # Standard actions-runner image expects ./config.sh and ./run.sh
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
      volumes:
      - name: docker-socket
        hostPath:
          path: /var/run/docker.sock
          type: Socket
